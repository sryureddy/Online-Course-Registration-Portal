<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - CVR College of Engineering</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <img src="images/cvrlogo.jpg" width="40" height="40" alt="">
            CVR College of Engineering
        </a>

        <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
                <li class="nav-item"><a class="nav-link active" href="registration.html">Register</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Registration Form -->
<section class="py-5">
    <div class="container">

        <div class="row justify-content-center">
            <div class="col-md-8">

                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h3 class="text-center">Course Registration Form</h3>
                    </div>

                    <div class="card-body">

                        <!-- Success Alert -->
                        <div class="alert alert-success d-none" id="successAlert">
                            Registration Successful!
                        </div>

                        <form id="registrationForm">

                            <div class="mb-3">
                                <label class="form-label">Student Name</label>
                                <input type="text" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Mobile Number</label>
                                <input type="tel" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Gender</label>

                                <div>
                                    <input type="radio" name="gender"> Male
                                    <input type="radio" name="gender" class="ms-3"> Female
                                    <input type="radio" name="gender" class="ms-3"> Other
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Course Selection</label>

                                <select class="form-select">
                                    <option>Select Course</option>
                                    <option>Web Development</option>
                                    <option>Python Programming</option>
                                    <option>Data Science</option>
                                    <option>AI & Machine Learning</option>
                                    <option>Java Programming</option>
                                    <option>Cloud Computing</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Qualification</label>
                                <input type="text" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Address</label>
                                <textarea class="form-control" rows="3"></textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Upload Resume</label>
                                <input type="file" class="form-control">
                            </div>

                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" required>
                                <label class="form-check-label">
                                    I agree to the Terms & Conditions
                                </label>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                Register Now
                            </button>

                        </form>

                    </div>
                </div>

            </div>
        </div>

    </div>
</section>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-4">
    <div class="container">
        <p>CVR College of Engineering</p>
        <p>Vastunagar, Mangalpalli, Hyderabad</p>
        <p>Email: principal@cvr.ac.in</p>
    </div>
</footer>

<script src="js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById("registrationForm").addEventListener("submit", function(e){
    e.preventDefault();

    document.getElementById("successAlert").classList.remove("d-none");

    this.reset();
});
</script>

</body>
</html>
